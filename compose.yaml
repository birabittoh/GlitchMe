services:
  app:
    image: ghcr.io/birabittoh/glitchme:main
    build: .
    container_name: glitchme
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
